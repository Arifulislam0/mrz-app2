<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful Universal MRZ Generator - Live</title>
    
    <style>
        :root { --main-bg: #0d1117; --card-bg: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--main-bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid #30363d; }
        h2 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-size: 14px; color: #8b949e; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: var(--accent); color: white; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #2ea043; }
        .mrz-result { background: #000; color: #00ff00; padding: 20px; border-radius: 6px; font-family: 'Courier New', monospace; margin-top: 25px; word-break: break-all; border: 1px solid #333; font-size: 15px; line-height: 1.6; letter-spacing: 2px; }
        .ad-container { width: 100%; max-width: 500px; margin-top: 20px; padding: 15px; background: #21262d; border-radius: 8px; text-align: center; border: 1px dashed #444; }
        .footer { margin-top: 30px; font-size: 12px; color: #8b949e; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 Universal MRZ Generator</h2>
        
        <label>Country Code (e.g., BGD)</label>
        <input type="text" id="country" placeholder="BGD" maxlength="3">

        <label>Passport Number</label>
        <input type="text" id="passport" placeholder="Enter Passport No">

        <label>Surname (বংশগত নাম)</label>
        <input type="text" id="surname" placeholder="e.g., ISLAM">

        <label>Given Name (নাম)</label>
        <input type="text" id="givenName" placeholder="e.g., ARIFUL">

        <label>Date of Birth (YYMMDD)</label>
        <input type="text" id="dob" placeholder="e.g., 950520">

        <label>Gender</label>
        <select id="gender">
            <option value="M">Male (M)</option>
            <option value="F">Female (F)</option>
        </select>

        <label>Expiry Date (YYMMDD)</label>
        <input type="text" id="expiry" placeholder="e.g., 301231">

        <button onclick="generateMRZ()">Generate MRZ Now</button>

        <div class="mrz-result" id="output">
            P&lt;BGD<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<br>
            <<<<<<<<<<<<0BGD<<<<<<<<<<<<<<0<<<<<<<<
        </div>

        <button style="margin-top: 15px; background-color: #21262d; border: 1px solid #30363d;" onclick="copyToClipboard()">Copy MRZ Code</button>
    </div>

    <div class="ad-container">
        <p style="margin: 0 0 10px 0; font-size: 10px; color: #58a6ff;">ADVERTISEMENT</p>
        <div id="banner-ad">
            <p style="color: #444;">বিজ্ঞাপন এখানে লোড হবে</p>
        </div>
    </div>

    <div class="footer">
        Developed by Ariful | 100% Secure & Online
    </div>

<script>
    function generateMRZ() {
        // ইনপুট ভ্যালু নেওয়া
        const country = (document.getElementById('country').value || "BGD").toUpperCase().padEnd(3, '<');
        const passport = (document.getElementById('passport').value || "A00000000").toUpperCase().replace(/\s/g, '').padEnd(9, '<');
        const surname = (document.getElementById('surname').value || "SURNAME").toUpperCase().replace(/\s/g, '');
        const givenName = (document.getElementById('givenName').value || "NAME").toUpperCase().replace(/\s/g, '');
        const dob = (document.getElementById('dob').value || "000101").padEnd(6, '0');
        const gender = document.getElementById('gender').value;
        const expiry = (document.getElementById('expiry').value || "300101").padEnd(6, '0');

        // লাইন ১ তৈরি (৪৩ ক্যারেক্টার + ১ টাইপ)
        let nameField = (surname + "<<" + givenName).padEnd(39, '<');
        let line1 = "P<" + country + nameField;
        line1 = line1.substring(0, 44);

        // লাইন ২ তৈরি
        // চেক ডিজিট ক্যালকুলেশন এখানে সিম্পল রাখা হয়েছে, প্রফেশনাল কাজে < ব্যবহার হয়
        let line2 = passport + "0" + country + dob + "0" + gender + expiry + "0" + "<<<<<<<<<<<<<<";
        line2 = line2.substring(0, 44);
        
        // আউটপুট দেখানো
        document.getElementById('output').innerHTML = line1 + "<br>" + line2;
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("MRZ কোড কপি হয়েছে!");
        });
    }
</script>

</body>
</html>
