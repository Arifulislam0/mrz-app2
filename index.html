<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful Universal MRZ Generator Pro</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #121212; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .promo { color: #d93025; font-weight: bold; font-size: 0.8rem; margin-bottom: 20px; background: #fff1f0; padding: 10px; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        .full { grid-column: span 2; }
        label { font-size: 0.7rem; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        .output-box { background: var(--dark); color: #00ff41; padding: 15px; border-radius: 8px; margin: 20px 0; font-family: monospace; font-size: 1.1rem; line-height: 1.4; letter-spacing: 1px; min-height: 50px; text-align: left; }
        button { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .footer { margin-top: 15px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--primary); margin-top:0;">🚀 ARIFUL MRZ GEN PRO</h2>
    <div class="promo">All KYC Services available. WhatsApp: +8801981071493</div>

    <div class="grid">
        <div class="input-grp"><label>DOC TYPE</label><select id="type" class="m-in"><option value="P">P (Passport)</option></select></div>
        <div class="input-grp"><label>COUNTRY CODE</label><input type="text" id="country" class="m-in" placeholder="ETH" maxlength="3"></div>
        <div class="input-grp full"><label>PASSPORT NUMBER</label><input type="text" id="passport" class="m-in" placeholder="EQ1827018" maxlength="9"></div>
        <div class="input-grp"><label>SURNAME</label><input type="text" id="surname" class="m-in" placeholder="SHIFERAW"></div>
        <div class="input-grp"><label>GIVEN NAMES</label><input type="text" id="given" class="m-in" placeholder="TSEGAW"></div>
        <div class="input-grp"><label>GENDER</label><select id="sex" class="m-in"><option value="M">Male (M)</option><option value="F">Female (F)</option></select></div>
        <div class="input-grp"><label>DOB (YYMMDD)</label><input type="text" id="dob" class="m-in" maxlength="6" placeholder="971121"></div>
        <div class="input-grp full"><label>EXPIRY (YYMMDD)</label><input type="text" id="exp" class="m-in" maxlength="6" placeholder="300115"></div>
    </div>

    <div class="output-box" id="result">Output will appear here..</div>
    <button id="copy">COPY RESULT</button>
    <div class="footer">Developed By: <b>Ariful</b> | +8801981071493</div>
</div>

<script>
    // ICAO Check Digit Algorithm (7-3-1 Weighting)
    function getCheckDigit(str) {
        const chars = "0123456789<ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const weights = [7, 3, 1];
        let sum = 0;
        for (let i = 0; i < str.length; i++) {
            let val = chars.indexOf(str[i]);
            if (val === -1) val = 0;
            sum += val * weights[i % 3];
        }
        return sum % 10;
    }

    const inputs = document.querySelectorAll('.m-in');
    inputs.forEach(el => el.addEventListener('input', () => {
        const type = document.getElementById('type').value;
        const country = document.getElementById('country').value.toUpperCase().padEnd(3, '<').substring(0,3);
        const pass = document.getElementById('passport').value.toUpperCase().padEnd(9, '<').substring(0,9);
        const sur = document.getElementById('surname').value.toUpperCase().replace(/\s/g, '<');
        const giv = document.getElementById('given').value.toUpperCase().replace(/\s/g, '<');
        const dob = document.getElementById('dob').value.padEnd(6, '<').substring(0,6);
        const sex = document.getElementById('sex').value.substring(0,1);
        const exp = document.getElementById('exp').value.padEnd(6, '<').substring(0,6);

        // Calculate Check Digits
        const c1 = getCheckDigit(pass);
        const c2 = getCheckDigit(dob);
        const c3 = getCheckDigit(exp);
        
        // Final Global Check Digit (Passport + Dob + Exp)
        const finalCheckStr = pass + c1 + dob + c2 + exp + c3;
        const cFinal = getCheckDigit(finalCheckStr);

        // Line 1
        let names = (sur + "<<" + giv).padEnd(39, '<').substring(0, 39);
        let line1 = ${type}<${country}${names};

        // Line 2
        let line2 = ${pass}${c1}${country}${dob}${c2}${sex}${exp}${c3}${"<<<<<<<<<<<<<<<"}${cFinal};

        document.getElementById('result').innerHTML = line1 + "<br>" + line2.substring(0,44);
    }));

    document.getElementById('copy').addEventListener('click', () => {
        navigator.clipboard.writeText(document.getElementById('result').innerText);
        alert("Copied!");
    });
</script>
</body>
</html>
