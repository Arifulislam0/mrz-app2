<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful Universal MRZ Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { font-size: 24px; color: #333; margin-bottom: 5px; text-transform: uppercase; }
        .contact { color: #2563eb; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            text-align: left;
            margin-bottom: 30px;
        }
        .input-box label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #fdfdfd;
            font-size: 14px;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        
        .mrz-display {
            background: #000;
            color: #00ff00;
            padding: 25px;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            letter-spacing: 3px;
            line-height: 1.6;
            min-height: 60px;
            margin-bottom: 20px;
            word-break: break-all;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 16px;
        }
        .btn-copy { background-color: #28a745; color: white; }
        .btn-reset { background-color: #e44d26; color: white; }
        
        footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h1>Ariful Universal MRZ Generator</h1>
    <div class="contact">WhatsApp: +8801981071493</div>
    
    <div class="grid-container">
        <div class="input-box">
            <label>Doc Type</label>
            <input type="text" id="docType" value="P" maxlength="1">
        </div>
        <div class="input-box">
            <label>Country Code</label>
            <input type="text" id="countryCode" placeholder="BGD" maxlength="3">
        </div>
        <div class="input-box">
            <label>Passport No</label>
            <input type="text" id="passportNo" placeholder="EP0937651" oninput="updateMRZ()">
        </div>

        <div class="input-box">
            <label>Surname</label>
            <input type="text" id="surname" placeholder="KHAN" oninput="updateMRZ()">
        </div>
        <div class="input-box">
            <label>Given Names</label>
            <input type="text" id="givenName" placeholder="AYUB ALI" oninput="updateMRZ()">
        </div>
        <div class="input-box">
            <label>Gender</label>
            <select id="gender" onchange="updateMRZ()">
                <option value="M">Male</option>
                <option value="F">Female</option>
            </select>
        </div>

        <div class="input-box">
            <label>DOB (YYMMDD)</label>
            <input type="text" id="dob" placeholder="990322" maxlength="6" oninput="updateMRZ()">
        </div>
        <div class="input-box">
            <label>Expiry (YYMMDD)</label>
            <input type="text" id="expiry" placeholder="350806" maxlength="6" oninput="updateMRZ()">
        </div>
        <div class="input-box">
            <label>Personal ID / Optional</label>
            <input type="text" id="personalId" placeholder="9152385414" oninput="updateMRZ()">
        </div>
    </div>

    <div class="mrz-display" id="mrzOutput">
        <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<br>
        <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
    </div>

    <div class="button-group">
        <button class="btn-copy" onclick="copyMRZ()">Copy Result</button>
        <button class="btn-reset" onclick="location.reload()">Reset</button>
    </div>

    <footer>Developed by Ariful | WhatsApp: +8801981071493</footer>
</div>

<script>
    function calculateCheckDigit(data) {
        const weights = [7, 3, 1];
        let sum = 0;
        for (let i = 0; i < data.length; i++) {
            let char = data[i];
            let value;
            if (/[0-9]/.test(char)) value = parseInt(char);
            else if (/[A-Z]/.test(char)) value = char.charCodeAt(0) - 55;
            else value = 0;
            sum += value * weights[i % 3];
        }
        return sum % 10;
    }

    function updateMRZ() {
        const type = document.getElementById('docType').value.toUpperCase() || 'P';
        const country = (document.getElementById('countryCode').value.toUpperCase() || '<<<').padEnd(3, '<');
        const surname = document.getElementById('surname').value.toUpperCase().replace(/\s+/g, '<');
        const givenName = document.getElementById('givenName').value.toUpperCase().replace(/\s+/g, '<');
        
        const pNo = (document.getElementById('passportNo').value.toUpperCase() || '').padEnd(9, '<').substring(0,9);
        const dob = document.getElementById('dob').value || '<<<<<<';
        const sex = document.getElementById('gender').value;
        const exp = document.getElementById('expiry').value || '<<<<<<';
        const pId = (document.getElementById('personalId').value.toUpperCase() || '').replace(/\s+/g, '').padEnd(14, '<').substring(0,14);

        // Line 1
        let line1 = type + "<" + country + surname + "<<" + givenName;
        line1 = line1.padEnd(44, '<').substring(0, 44);

        // Check Digits
        const pNoDigit = pNo.includes('<') ? '<' : calculateCheckDigit(pNo);
        const dobDigit = dob.includes('<') ? '<' : calculateCheckDigit(dob);
        const expDigit = exp.includes('<') ? '<' : calculateCheckDigit(exp);
        const pIdDigit = pId.includes('<') ? '<' : calculateCheckDigit(pId);

        // Composite Check Digit (Final Number)
        let compositeSource = pNo + pNoDigit + dob + dobDigit + exp + expDigit + pId + pIdDigit;
        const finalDigit = compositeSource.includes('<') ? '<' : calculateCheckDigit(compositeSource);

        // Line 2
        let line2 = pNo + pNoDigit + country + dob + dobDigit + sex + exp + expDigit + pId + pIdDigit + finalDigit;
        line2 = line2.padEnd(44, '<').substring(0, 44);

        document.getElementById('mrzOutput').innerHTML = line1 + "<br>" + line2;
    }

    function copyMRZ() {
        const text = document.getElementById('mrzOutput').innerText;
        navigator.clipboard.writeText(text);
        alert("MRZ Copied Successfully!");
    }
</script>

</body>
</html>
