<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful Universal MRZ Generator</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .header { color: #1a73e8; font-weight: bold; font-size: 20px; margin-bottom: 5px; }
        .alert-text { color: red; font-size: 11px; font-weight: bold; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        label { font-size: 10px; font-weight: bold; color: #555; display: block; margin-bottom: 3px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-transform: uppercase; font-size: 13px; }
        .full-width { grid-column: span 2; }
        #output { 
            background: #111; color: #00ff00; font-family: 'Courier New', Courier, monospace; 
            padding: 15px; border-radius: 5px; margin-top: 15px; font-size: 15px; 
            text-align: left; white-space: pre-wrap; word-break: break-all;
            min-height: 40px; line-height: 1.4; letter-spacing: 1.5px; border-left: 4px solid #1a73e8;
        }
        .copy-btn { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .footer { margin-top: 15px; font-size: 12px; color: #666; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">🚀 ARIFUL UNIVERSAL MRZ GENERATOR</div>
    <div class="alert-text">All types of KYC services available. WhatsApp: +8801981071493</div>
    
    <div class="grid">
        <div>
            <label>DOC TYPE</label>
            <select id="docType" onchange="runGen()">
                <option value="P">P (Standard Passport)</option>
                <option value="PM">PM (Official/Diplomatic)</option>
            </select>
        </div>
        <div>
            <label>COUNTRY CODE (ISO)</label>
            <input type="text" id="country" placeholder="BGD" maxlength="3" oninput="runGen()">
        </div>
        <div class="full-width">
            <label>PASSPORT NUMBER</label>
            <input type="text" id="passNum" placeholder="EG0654793" oninput="runGen()">
        </div>
        <div>
            <label>SURNAME</label>
            <input type="text" id="surname" placeholder="ISLAM" oninput="runGen()">
        </div>
        <div>
            <label>GIVEN NAMES</label>
            <input type="text" id="givenNames" placeholder="ARIFUL" oninput="runGen()">
        </div>
        <div>
            <label>GENDER</label>
            <select id="gender" onchange="runGen()">
                <option value="M">MALE (M)</option>
                <option value="F">FEMALE (F)</option>
            </select>
        </div>
        <div>
            <label>DATE OF BIRTH (YYMMDD)</label>
            <input type="text" id="dob" placeholder="970302" maxlength="6" oninput="runGen()">
        </div>
        <div>
            <label>EXPIRY DATE (YYMMDD)</label>
            <input type="text" id="expiry" placeholder="330602" maxlength="6" oninput="runGen()">
        </div>
        <div class="full-width">
            <label>PERSONAL NUMBER / OPTIONAL</label>
            <input type="text" id="personalNum" placeholder="<<<<<<<<<<<<<" maxlength="14" oninput="runGen()">
        </div>
    </div>

    <div id="output">Typing...</div>

    <button class="copy-btn" onclick="copyResult()">COPY RESULT</button>

    <div class="footer">Developed By: <b>Ariful</b> | WhatsApp: +8801981071493</div>
</div>

<script>
    // চেক সাম ক্যালকুলেটর
    function getCheckDigit(data) {
        const weights = [7, 3, 1];
        let sum = 0;
        for (let i = 0; i < data.length; i++) {
            let char = data[i];
            let val = 0;
            if (char >= '0' && char <= '9') val = parseInt(char);
            else if (char >= 'A' && char <= 'Z') val = char.charCodeAt(0) - 55;
            else val = 0;
            sum += val * weights[i % 3];
        }
        return sum % 10;
    }

    // টেক্সট ফিল করার ফাংশন
    function fix(str, len) {
        str = (str || "").toUpperCase().replace(/[^A-Z0-9]/g, '<');
        while (str.length < len) str += '<';
        return str.substring(0, len);
    }

    // মূল জেনারেটর ফাংশন
    function runGen() {
        const doc = fix(document.getElementById('docType').value, 2);
        const cnt = fix(document.getElementById('country').value, 3);
        const pNum = fix(document.getElementById('passNum').value, 9);
        const sur = document.getElementById('surname').value.toUpperCase().trim().replace(/\s+/g, '<');
        const giv = document.getElementById('givenNames').value.toUpperCase().trim().replace(/\s+/g, '<');
        const db = fix(document.getElementById('dob').value, 6);
        const ex = fix(document.getElementById('expiry').value, 6);
        const gen = document.getElementById('gender').value.charAt(0);
        const pvt = fix(document.getElementById('personalNum').value, 14);

        // ক্যালকুলেশন
        const c1 = getCheckDigit(pNum);
        const c2 = getCheckDigit(db);
        const c3 = getCheckDigit(ex);
        const c4 = getCheckDigit(pvt);
        const c5 = getCheckDigit(pNum + c1 + db + c2 + ex + c3 + pvt + c4);

        // লাইন ১ ও ২ তৈরি
        const line1 = doc + cnt + fix(sur + '<<' + giv, 39);
        const line2 = pNum + c1 + cnt + db + c2 + gen + ex + c3 + pvt + c4 + c5;

        document.getElementById('output').innerText = line1 + '\n' + line2;
    }

    function copyResult() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text).then(() => alert("MRZ Copied!"));
    }

    // পেজ লোড হওয়ার পর অটো কল
    window.onload = runGen;
</script>

</body>
</html>
